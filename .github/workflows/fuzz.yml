name: Fuzz

on:
  schedule:
    # Nightly short fuzz run at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds to run the fuzzer"
        default: "300"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  fuzz:
    name: Nightly Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          # cargo-fuzz requires a nightly toolchain
          toolchain: nightly
          cache-key: fuzz

      - uses: cargo-bins/cargo-binstall@d125de8b4538541574fd9357b6feb61c8486464b # main
      - run: cargo binstall --no-confirm cargo-fuzz

      # Carry the corpus across runs so nightly fuzzing keeps making progress
      # instead of starting cold every night.
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-

      - name: Run fuzzer
        working-directory: fuzz
        run: cargo +nightly fuzz run --sanitizer none resolver -- -only_ascii=1 -max_total_time=${{ inputs.max_total_time || '300' }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts
          if-no-files-found: ignore
