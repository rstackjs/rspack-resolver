name: Benchmark

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark (Gungraun)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Branch
        uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.33.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup benchmark data
        run: cd benches && pnpm install --ignore-workspace

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache-key: benchmark-gungraun
          cache-save-if: ${{ github.ref_name == 'main' }}

      - uses: ./.github/actions/pnpm

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          tool: gungraun-runner@0.18.2

      - name: Run gungraun benchmark
        timeout-minutes: 45
        env:
          GUNGRAUN_VALGRIND_BIN: /usr/bin/valgrind
          RUSTFLAGS: "-C debuginfo=1 -C strip=none -g"
        run: cargo bench --bench resolver_gungraun -- --nocapture

      - name: Upload gungraun result files
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gungraun-target
          path: target/gungraun
          if-no-files-found: ignore
