name: Single Docker build

description: Docker build for a single target

inputs:
  target:
    required: true
    type: string
  image:
    required: true
    type: string
  profile:
    default: "release"
    required: false
    type: string
  options:
    description: "Options for docker"
    default: ""
    required: false
    type: string
  pre:
    required: false
    default: ""
    type: string
  post:
    required: false
    default: ""
    type: string
  plugin:
    required: false
    default: true
    type: boolean

runs:
  using: composite
  steps:
    - name: Docker Build ${{ inputs.target }}
      shell: bash
      run: |
        code='
          set -e
          if [ -x "$(command -v sccache)" ]; then
            export RUSTC_WRAPPER=sccache
            echo "enable sccache"
          fi
          ${{ inputs.pre }}
          rustup target add ${{ inputs.target }}

          # The lts-debian image ships Node 20, whose module loader crashes when
          # invoking pnpm 11 through the corepack shim (ERR_VM_DYNAMIC_IMPORT_CALLBACK_MISSING).
          # Install pnpm as a standalone binary instead of relying on the corepack shim.
          PNPM_VERSION=$(node -p "require(\"./package.json\").packageManager.replace(\"pnpm@\", \"\")")
          npm install -g "@pnpm/exe@$PNPM_VERSION" --force
          pnpm --version

          RUST_TARGET=${{ inputs.target }} ${{ inputs.plugin == 'false' && 'DISABLE_PLUGIN=1' || '' }} pnpm build:binding:${{ inputs.profile }}  --target ${{ inputs.target }}
          ${{ inputs.post }}
        '
        if [[ ! -n "$CARGO_HOME" ]]; then
          CARGO_HOME="$(dirname $(dirname $(which cargo)))"
        fi

        docker run \
          --rm \
          --privileged \
          --user 0:0 \
          -v $CARGO_HOME/registry/index:/usr/local/cargo/registry/index \
          -v $CARGO_HOME/registry/cache:/usr/local/cargo/registry/cache \
          -v $CARGO_HOME/git/db:/usr/local/cargo/git/db \
          -v /tmp:/tmp \
          ${{ inputs.options }} \
          -e CI=1 \
          -e HOME=$HOME \
          -v $HOME/.cache:$HOME/.cache \
          -v ${{ github.workspace }}:/build \
          -w /build \
          -i \
          ${{ inputs.image }} \
          bash -c "$code"
